monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - fixtures
        - weather_api
        - messenger

when@dev:
    monolog:
        handlers:
            fixtures:
                type: stream
                path: "%kernel.logs_dir%/fixtures.log"
                level: debug
                channels: [ "fixtures" ]
            weather_api:
                type: stream
                path: "%kernel.logs_dir%/weather_api.log"
                level: debug
                channels: [ "weather_api" ]
            messenger:
                type: stream
                path: "%kernel.logs_dir%/messenger.log"
                level: debug
                channels: [ "messenger" ]
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event", "!fixtures", "!weather_api", "!messenger"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
