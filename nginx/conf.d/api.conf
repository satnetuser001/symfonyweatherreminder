server {
    listen 443 ssl;
    server_name api.symfonyweatherreminder.mooo.com;

    ssl_certificate     /etc/letsencrypt/live/symfonyweatherreminder.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/symfonyweatherreminder.mooo.com/privkey.pem;

    root /project/public;
    index index.php;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    }

    location ~ /\. {
        deny all;
    }
}
