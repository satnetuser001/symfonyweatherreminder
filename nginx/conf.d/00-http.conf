server {
    listen 80;
    server_name symfonyweatherreminder.mooo.com www.symfonyweatherreminder.mooo.com api.symfonyweatherreminder.mooo.com;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
